<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Far Out! The 1970s Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
--burnt-orange: #C4622D;
--mustard: #D4A017;
--avocado: #6B8C42;
--harvest-gold: #E8A020;
--brown: #5C3D2E;
--cream: #F5ECD7;
--rust: #A0522D;
--teal: #2D7B6B;
--dark: #1A0F00;
--warm-white: #FBF4E3;
}


* { margin: 0; padding: 0; box-sizing: border-box; }


body {
background: var(--dark);
color: var(--cream);
font-family: 'Space Mono', monospace;
overflow-x: hidden;
}


/* GROOVY BACKGROUND */
body::before {
content: '';
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 80% 60% at 20% 20%, rgba(196,98,45,0.15) 0%, transparent 60%),
radial-gradient(ellipse 60% 80% at 80% 80%, rgba(107,140,66,0.12) 0%, transparent 60%),
radial-gradient(ellipse 40% 40% at 50% 50%, rgba(212,160,23,0.08) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}


/* HERO */
.hero {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
position: relative;
padding: 2rem;
overflow: hidden;
}


.hero-rings {
position: absolute;
width: 900px;
height: 900px;
border-radius: 50%;
border: 2px solid rgba(212,160,23,0.15);
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
animation: spin 40s linear infinite;
}
.hero-rings::before {
content: '';
position: absolute;
inset: 40px;
border-radius: 50%;
border: 2px solid rgba(196,98,45,0.12);
animation: spin 25s linear infinite reverse;
}
.hero-rings::after {
content: '';
position: absolute;
inset: 100px;
border-radius: 50%;
border: 1px solid rgba(107,140,66,0.1);
animation: spin 60s linear infinite;
}


@keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }


.hero-tag {
font-family: 'Space Mono', monospace;
font-size: 0.7rem;
letter-spacing: 0.4em;
color: var(--harvest-gold);
text-transform: uppercase;
margin-bottom: 1.5rem;
position: relative;
z-index: 1;
animation: fadeUp 0.8s ease both;
}


.hero h1 {
font-family: 'Playfair Display', serif;
font-size: clamp(3.5rem, 10vw, 8rem);
font-weight: 900;
line-height: 0.9;
position: relative;
z-index: 1;
animation: fadeUp 0.9s ease 0.1s both;
}


.hero h1 .line1 { color: var(--cream); display: block; }
.hero h1 .line2 {
color: transparent;
-webkit-text-stroke: 2px var(--burnt-orange);
display: block;
font-style: italic;
}
.hero h1 .line3 { color: var(--mustard); display: block; }


.hero-sub {
font-size: 0.85rem;
color: rgba(245,236,215,0.6);
margin: 2rem auto;
max-width: 500px;
line-height: 1.8;
position: relative;
z-index: 1;
animation: fadeUp 1s ease 0.2s both;
}


.hero-nav {
display: flex;
flex-wrap: wrap;
gap: 0.75rem;
justify-content: center;
margin-top: 1rem;
position: relative;
z-index: 1;
animation: fadeUp 1s ease 0.3s both;
}


.nav-pill {
padding: 0.5rem 1.25rem;
border: 1px solid rgba(212,160,23,0.4);
border-radius: 100px;
background: rgba(212,160,23,0.08);
color: var(--mustard);
font-size: 0.75rem;
letter-spacing: 0.15em;
text-transform: uppercase;
cursor: pointer;
transition: all 0.3s;
font-family: 'Space Mono', monospace;
}
.nav-pill:hover, .nav-pill.active {
background: var(--mustard);
color: var(--dark);
border-color: var(--mustard);
}


@keyframes fadeUp {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}


/* SECTIONS */
.section {
max-width: 1100px;
margin: 0 auto;
padding: 5rem 2rem;
display: none;
position: relative;
z-index: 1;
}
.section.active { display: block; animation: fadeUp 0.5s ease both; }


.section-header {
display: flex;
align-items: baseline;
gap: 1.5rem;
margin-bottom: 3rem;
border-bottom: 1px solid rgba(212,160,23,0.2);
padding-bottom: 1.5rem;
}


.section-num {
font-family: 'Playfair Display', serif;
font-size: 4rem;
font-weight: 900;
color: rgba(212,160,23,0.2);
line-height: 1;
}


.section-title {
font-family: 'Playfair Display', serif;
font-size: 2.5rem;
font-weight: 700;
color: var(--cream);
}


.section-title span {
color: var(--burnt-orange);
font-style: italic;
}


/* CARDS GRID */
.cards-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 1.5rem;
}


.card {
background: rgba(245,236,215,0.04);
border: 1px solid rgba(245,236,215,0.1);
border-radius: 4px;
padding: 1.75rem;
transition: all 0.3s;
position: relative;
overflow: hidden;
}
.card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 3px;
height: 0;
background: var(--burnt-orange);
transition: height 0.3s;
}
.card:hover {
background: rgba(245,236,215,0.07);
border-color: rgba(245,236,215,0.2);
transform: translateY(-2px);
}
.card:hover::before { height: 100%; }


.card-icon { font-size: 2rem; margin-bottom: 0.75rem; }
.card-title {
font-family: 'Playfair Display', serif;
font-size: 1.1rem;
font-weight: 700;
color: var(--mustard);
margin-bottom: 0.5rem;
}
.card-body {
font-size: 0.8rem;
line-height: 1.8;
color: rgba(245,236,215,0.7);
}
.card-year {
display: inline-block;
font-size: 0.65rem;
letter-spacing: 0.2em;
padding: 0.2rem 0.6rem;
background: rgba(196,98,45,0.2);
border: 1px solid rgba(196,98,45,0.3);
color: var(--burnt-orange);
margin-top: 0.75rem;
border-radius: 2px;
}


/* TIMELINE */
.timeline {
position: relative;
padding-left: 2.5rem;
}
.timeline::before {
content: '';
position: absolute;
left: 0;
top: 0; bottom: 0;
width: 1px;
background: linear-gradient(to bottom, var(--burnt-orange), var(--mustard), var(--avocado));
}
.timeline-item {
position: relative;
margin-bottom: 2.5rem;
padding-left: 1.5rem;
}
.timeline-item::before {
content: '';
position: absolute;
left: -2.6rem;
top: 0.4rem;
width: 10px;
height: 10px;
border-radius: 50%;
background: var(--burnt-orange);
border: 2px solid var(--dark);
box-shadow: 0 0 0 2px var(--burnt-orange);
}
.timeline-year {
font-size: 0.65rem;
letter-spacing: 0.3em;
color: var(--harvest-gold);
text-transform: uppercase;
margin-bottom: 0.25rem;
}
.timeline-title {
font-family: 'Playfair Display', serif;
font-size: 1.1rem;
color: var(--cream);
margin-bottom: 0.4rem;
}
.timeline-desc {
font-size: 0.78rem;
color: rgba(245,236,215,0.6);
line-height: 1.7;
}


/* QUIZ */
.quiz-container {
max-width: 680px;
margin: 0 auto;
}
.quiz-progress {
display: flex;
gap: 0.4rem;
margin-bottom: 2rem;
}
.quiz-dot {
height: 4px;
flex: 1;
background: rgba(245,236,215,0.15);
border-radius: 2px;
transition: background 0.4s;
}
.quiz-dot.done { background: var(--avocado); }
.quiz-dot.current { background: var(--mustard); }


.quiz-question-wrap {
background: rgba(245,236,215,0.04);
border: 1px solid rgba(245,236,215,0.1);
border-radius: 4px;
padding: 2.5rem;
margin-bottom: 1.5rem;
}
.quiz-qnum {
font-size: 0.65rem;
letter-spacing: 0.3em;
color: var(--mustard);
margin-bottom: 1rem;
}
.quiz-q {
font-family: 'Playfair Display', serif;
font-size: 1.4rem;
color: var(--cream);
line-height: 1.4;
margin-bottom: 1.5rem;
}
.quiz-options {
display: flex;
flex-direction: column;
gap: 0.75rem;
}
.quiz-option {
padding: 0.9rem 1.25rem;
border: 1px solid rgba(245,236,215,0.15);
border-radius: 3px;
background: rgba(245,236,215,0.03);
color: rgba(245,236,215,0.8);
font-family: 'Space Mono', monospace;
font-size: 0.8rem;
cursor: pointer;
transition: all 0.2s;
text-align: left;
}
.quiz-option:hover:not(.answered) {
border-color: rgba(212,160,23,0.4);
background: rgba(212,160,23,0.08);
color: var(--cream);
}
.quiz-option.correct {
border-color: var(--avocado);
background: rgba(107,140,66,0.15);
color: var(--cream);
}
.quiz-option.wrong {
border-color: var(--rust);
background: rgba(160,82,45,0.15);
color: rgba(245,236,215,0.5);
}


.quiz-feedback {
padding: 1rem 1.25rem;
border-radius: 3px;
font-size: 0.8rem;
line-height: 1.6;
margin-top: 1rem;
display: none;
}
.quiz-feedback.show { display: block; animation: fadeUp 0.3s ease; }
.quiz-feedback.correct-fb { background: rgba(107,140,66,0.15); border: 1px solid rgba(107,140,66,0.3); color: #9DC96B; }
.quiz-feedback.wrong-fb { background: rgba(160,82,45,0.15); border: 1px solid rgba(160,82,45,0.3); color: #D4855A; }


.btn {
padding: 0.75rem 2rem;
font-family: 'Space Mono', monospace;
font-size: 0.75rem;
letter-spacing: 0.15em;
text-transform: uppercase;
cursor: pointer;
border: none;
border-radius: 2px;
transition: all 0.2s;
margin-top: 1rem;
}
.btn-primary {
background: var(--burnt-orange);
color: var(--cream);
}
.btn-primary:hover { background: #D4713A; transform: translateY(-1px); }
.btn-secondary {
background: transparent;
color: var(--mustard);
border: 1px solid var(--mustar
